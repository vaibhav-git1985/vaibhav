services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  eureka:
    build:
      context: ./Eureka-Server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      EUREKA_INSTANCE_HOSTNAME: eureka

  user-service:
    build:
      context: ./User-Service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: user-service
      DB_HOST: mysql:3306
      DB_NAME: ecommerce_db
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  product-service:
    build:
      context: ./PRODUCT-SERVICE
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: product-service
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DATABASE: ProductDB
    depends_on:
      - mongo
      - eureka

  order-service:
    build:
      context: ./ORDER-SERVICE
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: order-service
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal}
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  payment-service:
    build:
      context: ./PAYMENT-SERVICE
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: payment-service
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/payment_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      WORKER_ENQUEUE_URL: http://worker:3001/internal/jobs/deliver
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal}
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  delivery-service:
    build:
      context: ./DELIVERY-SERVICE
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: delivery-service
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/delivery_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal}
    depends_on:
      mysql:
        condition: service_healthy
      eureka:
        condition: service_started

  api-gateway:
    build:
      context: ./API-GATEWAY
      dockerfile: Dockerfile
    ports:
      - "9292:9292"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:8761/eureka
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      APP_SECURITY_ENABLED: ${APP_SECURITY_ENABLED:-false}
      OKTA_ISSUER_URI: ${OKTA_ISSUER_URI:-}
    depends_on:
      eureka:
        condition: service_started

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-this-nextauth-secret-min-32-chars-long}
      GATEWAY_URL: http://api-gateway:9292
      NEXT_PUBLIC_GATEWAY_URL: ${NEXT_PUBLIC_GATEWAY_URL:-http://localhost:9292}
      OKTA_OAUTH2_CLIENT_ID: ${OKTA_OAUTH2_CLIENT_ID:-}
      OKTA_OAUTH2_CLIENT_SECRET: ${OKTA_OAUTH2_CLIENT_SECRET:-}
      OKTA_OAUTH2_ISSUER: ${OKTA_OAUTH2_ISSUER:-}
      FACEBOOK_CLIENT_ID: ${FACEBOOK_CLIENT_ID:-}
      FACEBOOK_CLIENT_SECRET: ${FACEBOOK_CLIENT_SECRET:-}
      ALLOW_DEV_LOGIN: ${ALLOW_DEV_LOGIN:-true}
    depends_on:
      - api-gateway

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      REDIS_URL: redis://redis:6379
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-change-me-internal}
      DELIVERY_SERVICE_URL: http://delivery-service:8085
      ORDER_SERVICE_URL: http://order-service:8083
    depends_on:
      - redis
      - delivery-service

volumes:
  mysql_data:
  mongo_data:
